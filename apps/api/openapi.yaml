openapi: 3.1.0
info:
  title: MJM Orcamentos API
  version: 0.1.0
  description: API interna de projetos e orcamentos com precificacao completa para WEBSITE, PLATAFORMA_WEB e SISTEMA_INTERNO. Sistema Interno atende processos executados principalmente por colaboradores; Plataforma Web entrega o valor principal a clientes, membros, fornecedores ou outros usuarios externos.
servers:
  - url: http://localhost:3001
paths:
  /auth/login:
    post:
      summary: Autenticar usuario
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        '200':
          description: Usuario autenticado; o JWT e enviado em cookie HttpOnly.
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/InvalidCredentials'
        '429':
          description: Limite de tentativas excedido.
  /auth/logout:
    post:
      summary: Remover o cookie de autenticacao
      operationId: logout
      responses:
        '204':
          description: Cookie removido.
  /auth/me:
    get:
      summary: Consultar usuario autenticado
      operationId: getAuthenticatedUser
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Usuario autenticado e ativo.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
  /projects:
    get:
      summary: Listar projetos
      security: [{ cookieAuth: [] }]
      responses:
        '200': { description: Lista de projetos. }
        '401': { $ref: '#/components/responses/Unauthenticated' }
    post:
      summary: Criar projeto
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateProjectInput' }
      responses:
        '201': { description: Projeto criado. }
        '400': { $ref: '#/components/responses/ValidationError' }
  /projects/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      summary: Consultar projeto
      security: [{ cookieAuth: [] }]
      responses:
        '200': { description: Projeto encontrado. }
        '404': { description: Projeto nao encontrado. }
    patch:
      summary: Editar projeto
      security: [{ cookieAuth: [] }]
      responses:
        '200': { description: Projeto atualizado. }
        '409': { description: O tipo da aplicacao nao pode mudar depois da criacao de orcamentos. }
    delete:
      summary: Excluir projeto sem orcamentos
      security: [{ cookieAuth: [] }]
      responses:
        '204': { description: Projeto excluido. }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '404':
          description: Projeto nao encontrado.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '409': { description: Projetos com orcamentos nao podem ser excluidos. }
  /projects/{projectId}/budgets:
    parameters:
      - name: projectId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      summary: Listar versoes de orcamento do projeto
      security: [{ cookieAuth: [] }]
      responses:
        '200': { description: Lista de orcamentos. }
    post:
      summary: Criar nova versao de orcamento WEBSITE, PLATAFORMA_WEB ou SISTEMA_INTERNO
      security: [{ cookieAuth: [] }]
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          description: UUID opcional reutilizado como id do orcamento; repetir a mesma requisicao com a mesma chave devolve o registro ja criado sem gerar outra versao.
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateBudgetInput' }
      responses:
        '201': { description: Orcamento calculado e persistido com seus itens. }
        '400': { description: Envelope, chave de idempotencia ou campos do tipo de aplicacao invalidos. }
        '409': { description: O tipo do projeto mudou, a versao nao pode ser reservada ou a chave de idempotencia foi reutilizada com outro conteudo. }
        '422': { description: Tipo de aplicacao ainda sem precificacao. }
  /budgets/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      summary: Consultar orcamento e itens congelados
      security: [{ cookieAuth: [] }]
      responses:
        '200': { description: Orcamento encontrado. }
    patch:
      summary: Editar um rascunho; recalcular apenas quando inputData for informado
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateBudgetInput' }
      responses:
        '200': { description: Rascunho atualizado. }
        '409': { description: Orcamento nao editavel. }
    delete:
      summary: Excluir um orcamento em rascunho e seus itens
      security: [{ cookieAuth: [] }]
      responses:
        '204': { description: Orcamento em rascunho excluido. }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '404': { description: Orcamento nao encontrado. }
        '409': { description: Apenas orcamentos em rascunho podem ser excluidos. }
  /budgets/{id}/recalculate:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      summary: Recalcular um rascunho com os precos ativos
      security: [{ cookieAuth: [] }]
      responses:
        '200': { description: Rascunho recalculado. }
        '409': { description: Orcamento nao editavel. }
  /budgets/{id}/finalize:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      summary: Finalizar um orcamento sem recalcular seus valores congelados
      security: [{ cookieAuth: [] }]
      responses:
        '200': { description: Status alterado para FINALIZADO ou confirmacao idempotente de que ja estava finalizado; escopo, itens e totais sao preservados. }
        '409': { description: Orcamento esta em um status diferente de RASCUNHO ou FINALIZADO. }
  /pricing-configs:
    get:
      summary: Listar configuracoes de preco ativas
      security: [{ cookieAuth: [] }]
      responses:
        '200': { description: Configuracoes ativas; valores decimais sao strings. }
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: mjm_auth
  schemas:
    CreateProjectInput:
      type: object
      required: [name, applicationType]
      properties:
        name: { type: string, maxLength: 160 }
        clientName: { type: string, maxLength: 160 }
        description: { type: string, maxLength: 2000 }
        applicationType:
          type: string
          enum: [WEBSITE, ECOMMERCE, PLATAFORMA_WEB, APLICATIVO_MOBILE, SISTEMA_INTERNO, AUTOMACAO, OUTRO]
        status:
          type: string
          enum: [PROSPECCAO, PREPARACAO, EM_EXECUCAO, CONCLUIDO, CANCELADO]
          default: PROSPECCAO
        notes: { type: string, maxLength: 4000 }
    WebsiteBudgetInput:
      type: object
      additionalProperties: false
      required:
        - websiteCategory
        - sectionCount
        - pageCount
        - uniqueLayoutCount
        - languageCount
        - contentResponsibility
        - contentMigrationCount
        - designApproach
        - contentManagement
        - simpleFormCount
        - advancedFormCount
        - integrations
        - additionalModules
        - seoLevel
        - domainService
        - hostingPlan
        - maintenancePlan
        - complexityAdjustment
        - discountPercentage
      properties:
        websiteCategory:
          type: string
          enum: [LANDING_PAGE, INSTITUCIONAL, PORTAL_CONTEUDO]
        sectionCount:
          type: integer
          minimum: 1
          maximum: 200
          description: Quantidade de secoes da landing page; ignorada nas demais categorias.
        pageCount:
          type: integer
          minimum: 1
          maximum: 200
          description: Quantidade total de paginas; ignorada para landing pages.
        uniqueLayoutCount:
          type: integer
          minimum: 1
          maximum: 200
          description: Quantidade de layouts distintos; ignorada para landing pages e limitada a pageCount nas demais categorias.
        languageCount:
          type: integer
          minimum: 1
          maximum: 10
        contentResponsibility:
          type: string
          enum: [CLIENT_PROVIDES_READY, MJM_MIGRATES_EXISTING, MJM_PRODUCES_CONTENT]
        contentMigrationCount:
          type: integer
          minimum: 0
          maximum: 200
          description: Obrigatorio e maior que zero para MJM_MIGRATES_EXISTING; deve ser zero nos demais casos.
        designApproach:
          type: string
          enum: [CLIENT_PROVIDED, TEMPLATE_CUSTOMIZATION, CUSTOM_DESIGN]
        contentManagement:
          type: string
          enum: [NONE, STANDARD_CMS, CUSTOM_ADMIN]
        simpleFormCount: { type: integer, minimum: 0, maximum: 100 }
        advancedFormCount: { type: integer, minimum: 0, maximum: 50 }
        integrations:
          type: array
          maxItems: 20
          items: { $ref: '#/components/schemas/WebsiteIntegration' }
        additionalModules:
          type: array
          uniqueItems: true
          maxItems: 2
          description: BLOG nao pode ser repetido pelo PORTAL_CONTEUDO e exige gerenciamento de conteudo.
          items:
            type: string
            enum: [BLOG, SITE_SEARCH]
        seoLevel:
          type: string
          enum: [TECHNICAL_BASELINE, ON_PAGE_SETUP, CONTENT_STRATEGY]
        domainService:
          type: string
          enum: [CLIENT_MANAGED, NEW_REGISTRATION, TRANSFER, CONFIGURATION_ONLY]
        hostingPlan:
          type: string
          enum: [CLIENT_MANAGED, MJM_STANDARD, MJM_MANAGED]
        maintenancePlan:
          type: string
          enum: [NONE, ESSENTIAL, STANDARD, CUSTOM]
        targetLaunchDate:
          type: string
          format: date
          description: Data desejada de lancamento; 45 dias ou mais e normal, 21 a 44 e prioridade e ate 20 e expresso.
        complexityAdjustment:
          type: string
          enum: [NONE, MODERATE, HIGH]
        complexityReason:
          type: string
          maxLength: 500
          description: Obrigatorio quando complexityAdjustment for MODERATE ou HIGH.
        discountPercentage: { type: number, minimum: 0, maximum: 100, multipleOf: 0.01 }
        discountReason:
          type: string
          maxLength: 500
          description: Obrigatorio quando discountPercentage for maior que zero.
    WebsiteIntegration:
      type: object
      additionalProperties: false
      required: [name, complexity]
      properties:
        name: { type: string, minLength: 2, maxLength: 120 }
        complexity: { type: string, enum: [SIMPLE, STANDARD, COMPLEX] }
    WebPlatformScopedItem:
      type: object
      additionalProperties: false
      required: [name, complexity]
      properties:
        name: { type: string, minLength: 2, maxLength: 120 }
        description: { type: string, maxLength: 1000 }
        complexity: { type: string, enum: [SIMPLE, STANDARD, COMPLEX] }
    WebPlatformBudgetInput:
      type: object
      additionalProperties: false
      required:
        - platformCategory
        - accountStructure
        - screenCount
        - userRoleCount
        - languageCount
        - designApproach
        - functionalModules
        - adminBackoffice
        - dashboardCount
        - reportCount
        - additionalAuthentication
        - paymentFeatures
        - notificationChannels
        - fileHandling
        - auditLevel
        - integrations
        - dataMigration
        - dataMigrationSourceCount
        - hostingPlan
        - maintenancePlan
        - complexityAdjustment
        - discountPercentage
      properties:
        platformCategory:
          type: string
          enum: [CLIENT_PORTAL, SAAS, MARKETPLACE, MEMBERSHIP_PLATFORM, CUSTOM]
        customCategoryDescription:
          type: string
          maxLength: 500
          description: Obrigatoria quando platformCategory for CUSTOM.
        accountStructure:
          type: string
          enum: [SINGLE_ORGANIZATION, MULTI_ORGANIZATION]
        screenCount: { type: integer, minimum: 1, maximum: 200 }
        userRoleCount:
          type: integer
          minimum: 1
          maximum: 20
          description: Marketplace exige ao menos dois perfis.
        languageCount: { type: integer, minimum: 1, maximum: 10 }
        designApproach:
          type: string
          enum: [CLIENT_PROVIDED, DESIGN_SYSTEM_ADAPTATION, CUSTOM_DESIGN]
        functionalModules:
          type: array
          minItems: 1
          maxItems: 30
          description: Nomes devem ser unicos, desconsiderando caixa, espacos e acentos.
          items: { $ref: '#/components/schemas/WebPlatformScopedItem' }
        adminBackoffice:
          type: string
          enum: [NONE, STANDARD, CUSTOM]
        dashboardCount: { type: integer, minimum: 0, maximum: 20 }
        reportCount: { type: integer, minimum: 0, maximum: 50 }
        additionalAuthentication:
          type: array
          uniqueItems: true
          items:
            type: string
            enum: [SOCIAL_LOGIN, MFA, SSO]
        paymentFeatures:
          type: array
          uniqueItems: true
          description: MARKETPLACE_SPLIT esta disponivel apenas para MARKETPLACE.
          items:
            type: string
            enum: [ONE_TIME, SUBSCRIPTION, MARKETPLACE_SPLIT]
        notificationChannels:
          type: array
          uniqueItems: true
          description: Custos por consumo dos provedores nao fazem parte do calculo.
          items:
            type: string
            enum: [IN_APP, EMAIL, WHATSAPP_SMS]
        fileHandling:
          type: string
          enum: [NONE, BASIC_UPLOADS, DOCUMENT_WORKFLOW]
        auditLevel:
          type: string
          enum: [NONE, BASIC, COMPLETE]
        integrations:
          type: array
          maxItems: 20
          description: Nomes devem ser unicos, desconsiderando caixa, espacos e acentos.
          items: { $ref: '#/components/schemas/WebPlatformScopedItem' }
        dataMigration:
          type: string
          enum: [NONE, STRUCTURED_IMPORT, LEGACY_MIGRATION]
        dataMigrationSourceCount:
          type: integer
          minimum: 0
          maximum: 20
          description: Deve ser zero sem migracao e maior que zero nos demais casos.
        hostingPlan:
          type: string
          enum: [CLIENT_MANAGED, MJM_STANDARD, MJM_MANAGED]
        maintenancePlan:
          type: string
          enum: [NONE, ESSENTIAL, STANDARD, CUSTOM]
        targetLaunchDate:
          type: string
          format: date
          description: Data desejada de lancamento, nunca anterior ao dia UTC atual; 45 dias ou mais e normal, 21 a 44 e prioridade e ate 20 e expresso.
        complexityAdjustment:
          type: string
          enum: [NONE, MODERATE, HIGH]
        complexityReason:
          type: string
          maxLength: 500
          description: Obrigatoria quando complexityAdjustment for MODERATE ou HIGH.
        discountPercentage: { type: number, minimum: 0, maximum: 100, multipleOf: 0.01 }
        discountReason:
          type: string
          maxLength: 500
          description: Obrigatoria quando discountPercentage for maior que zero.
    InternalSystemScopedItem:
      type: object
      additionalProperties: false
      required: [name, complexity]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 120
          pattern: '^\s*\S.*\S\s*$'
        description:
          type: string
          maxLength: 1000
        complexity:
          type: string
          enum: [SIMPLE, STANDARD, COMPLEX]
    InternalSystemBudgetInput:
      type: object
      additionalProperties: false
      description: Escopo de uma aplicacao cujo valor principal e entregue aos colaboradores de uma organizacao para executar ou controlar processos internos. SaaS, multitenancy, marketplace, pagamentos do produto e portais de autoatendimento externos pertencem a PLATAFORMA_WEB. Mensalidades sao calculadas separadamente do total inicial.
      required:
        - modules
        - accessProfileCount
        - permissionModel
        - additionalAuthentication
        - workflowLevel
        - documentManagement
        - dashboardCount
        - reportCount
        - additionalNotificationChannels
        - integrations
        - dataMigration
        - dataMigrationSourceCount
        - hostingPlan
        - maintenancePlan
        - complexityAdjustment
        - discountPercentage
      properties:
        modules:
          type: array
          minItems: 1
          maxItems: 20
          description: Capacidades independentes do sistema, nao telas. Os nomes devem ser unicos apos ignorar caixa, espacos excedentes e acentos.
          items: { $ref: '#/components/schemas/InternalSystemScopedItem' }
        accessProfileCount:
          type: integer
          minimum: 1
          maximum: 20
          description: Perfis funcionais de acesso, nao quantidade de usuarios. A base inclui dois.
        targetLaunchDate:
          type: string
          format: date
          description: Data nunca anterior ao dia UTC atual. Sem data ou 45 dias ou mais e normal; 21 a 44 e prioridade; ate 20 e expresso.
        permissionModel:
          type: string
          enum: [STANDARD_ROLES, CUSTOM_PERMISSIONS]
          description: Papeis padrao estao incluidos; permissoes personalizadas geram adicional.
        additionalAuthentication:
          type: array
          uniqueItems: true
          description: E-mail e senha estao incluidos. Custos de fornecedores externos nao fazem parte do orcamento.
          items:
            type: string
            enum: [MFA, CORPORATE_SSO]
        workflowLevel:
          type: string
          enum: [NONE, SIMPLE, CUSTOM]
          description: Workflow global somente para processo transversal a mais de um modulo; fluxo restrito a um modulo deve compor sua complexidade.
        documentManagement:
          type: string
          enum: [NONE, BASIC_ATTACHMENTS, DOCUMENT_WORKFLOW]
        dashboardCount:
          type: integer
          minimum: 1
          maximum: 20
          description: Um dashboard simples esta incluido na base.
        reportCount:
          type: integer
          minimum: 0
          maximum: 50
        additionalNotificationChannels:
          type: array
          uniqueItems: true
          description: Notificacoes internas estao incluidas. Custos de e-mail, WhatsApp ou SMS nao estao incluidos.
          items:
            type: string
            enum: [EMAIL, WHATSAPP_SMS]
        integrations:
          type: array
          maxItems: 10
          description: Sistemas externos com os quais o Sistema Interno trocara dados. Nomes devem ser unicos apos normalizacao.
          items: { $ref: '#/components/schemas/InternalSystemScopedItem' }
        dataMigration:
          type: string
          enum: [NONE, STRUCTURED_IMPORT, LEGACY_MIGRATION]
        dataMigrationSourceCount:
          type: integer
          minimum: 0
          maximum: 20
        dataMigrationDescription:
          type: string
          minLength: 1
          maxLength: 1000
          pattern: '.*\S.*'
          description: Identificacao resumida das planilhas, bancos ou sistemas de origem.
        hostingPlan:
          type: string
          enum: [CLIENT_MANAGED, MJM_STANDARD, MJM_MANAGED]
          description: Implantacao MJM e pontual e nao ajustavel; a mensalidade e recorrente e nao entra no total inicial.
        maintenancePlan:
          type: string
          enum: [NONE, ESSENTIAL, STANDARD, CUSTOM]
          description: Manutencao e recorrente, nao entra no total inicial e nao recebe ajustes.
        complexityAdjustment:
          type: string
          enum: [NONE, MODERATE, HIGH]
        complexityReason:
          type: string
          minLength: 1
          maxLength: 500
          pattern: '.*\S.*'
          description: Fator transversal nao capturado pela complexidade dos modulos.
        discountPercentage:
          type: number
          minimum: 0
          maximum: 100
          multipleOf: 0.01
        discountReason:
          type: string
          minLength: 1
          maxLength: 500
          pattern: '.*\S.*'
      allOf:
        - if:
            properties:
              dataMigration: { const: NONE }
            required: [dataMigration]
          then:
            properties:
              dataMigrationSourceCount: { const: 0 }
            not:
              required: [dataMigrationDescription]
          else:
            required: [dataMigrationDescription]
            properties:
              dataMigrationSourceCount: { minimum: 1 }
        - if:
            properties:
              complexityAdjustment: { const: NONE }
            required: [complexityAdjustment]
          then:
            not:
              required: [complexityReason]
          else:
            required: [complexityReason]
        - if:
            properties:
              discountPercentage: { const: 0 }
            required: [discountPercentage]
          then:
            not:
              required: [discountReason]
          else:
            required: [discountReason]
      example:
        modules:
          - name: Controle de estoque
            complexity: SIMPLE
          - name: Ordens de servico
            complexity: STANDARD
          - name: Aprovacoes internas
            complexity: COMPLEX
        accessProfileCount: 4
        permissionModel: CUSTOM_PERMISSIONS
        additionalAuthentication: [MFA]
        workflowLevel: CUSTOM
        documentManagement: DOCUMENT_WORKFLOW
        dashboardCount: 2
        reportCount: 2
        additionalNotificationChannels: [EMAIL]
        integrations:
          - name: ERP corporativo
            complexity: STANDARD
        dataMigration: LEGACY_MIGRATION
        dataMigrationSourceCount: 2
        dataMigrationDescription: Banco do sistema anterior e planilha historica de estoque
        hostingPlan: MJM_MANAGED
        maintenancePlan: STANDARD
        targetLaunchDate: '2026-08-20'
        complexityAdjustment: MODERATE
        complexityReason: Regras transversais entre estoque, ordens e aprovacoes
        discountPercentage: 10
        discountReason: Condicao comercial de contratacao conjunta
    CreateBudgetInput:
      type: object
      additionalProperties: false
      required: [inputData]
      properties:
        inputData:
          oneOf:
            - $ref: '#/components/schemas/WebsiteBudgetInput'
            - $ref: '#/components/schemas/WebPlatformBudgetInput'
            - $ref: '#/components/schemas/InternalSystemBudgetInput'
          description: O schema aplicavel e determinado pelo applicationType do projeto; applicationType nao e repetido no corpo.
        notes: { type: string, maxLength: 4000 }
    UpdateBudgetInput:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        inputData:
          oneOf:
            - $ref: '#/components/schemas/WebsiteBudgetInput'
            - $ref: '#/components/schemas/WebPlatformBudgetInput'
            - $ref: '#/components/schemas/InternalSystemBudgetInput'
          description: O schema aplicavel e determinado pelo applicationType do projeto; applicationType nao e repetido no corpo.
        notes: { type: string, maxLength: 4000 }
    LoginInput:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 1
          maxLength: 200
    User:
      type: object
      additionalProperties: false
      required: [id, name, email, role, active]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [ADMIN, USER]
        active:
          type: boolean
    AuthResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: '#/components/schemas/User'
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
  responses:
    ValidationError:
      description: Dados de entrada invalidos.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InvalidCredentials:
      description: E-mail ou senha invalidos.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthenticated:
      description: Autenticacao ausente ou invalida.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
